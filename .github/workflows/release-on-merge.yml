name: Release mealie chart on merge to main

on:
  push:
    branches: [main]
    paths:
      - 'Chart.yaml'
      - 'Chart.lock'
      - 'values.yaml'
      - 'values/**'
      - 'README.md'
      - '.helmignore'
      - 'templates/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'Chart.yaml'
      - 'Chart.lock'
      - 'values.yaml'
      - 'values/**'
      - 'README.md'
      - '.helmignore'
      - 'templates/**'
      - '.github/workflows/**'

concurrency: release-mealie

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"
      - name: Lint and render chart
        run: |
          set -e
          helm repo add mealie https://expectedbehaviors.github.io/mealie || true
          helm repo update || true
          if ! helm dependency update .; then
            echo "Helm repo unreachable, using chart from GitHub Releases"
            mkdir -p charts
            curl -sL -o charts/mealie-1.0.0.tgz https://github.com/expectedbehaviors/mealie/releases/download/v1.0.0/mealie-1.0.0.tgz
            helm repo index charts --url "http://127.0.0.1:8765"
            (cd charts && python3 -m http.server 8765 &)
            sleep 5
            until curl -sf -o /dev/null http://127.0.0.1:8765/index.yaml; do sleep 1; done
            helm repo add mealie http://127.0.0.1:8765 --force-update
            helm dependency update .
          fi
          helm lint .
          helm template release . -f values.yaml > /dev/null

  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: lint
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Release on merge (create tag and release)
        uses: expectedbehaviors/github-actions/.github/actions/release-on-merge@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: "mealie-v"
