# Mealie — Argo CD uses expectedbehaviors/mealie chart; this file is values-only (no wrapper).
# Base chart provides: probes, resources, TZ (UTC), service. Override only ingress, persistence (Longhorn pre-created PVC), and setup-specific env (BASE_URL).
global:
  fullnameOverride: mealie
controllers:
  main:
    containers:
      main:
        env:
          BASE_URL: "https://mealie.expectedbehaviors.com"
ingress:
  main:
    enabled: true
    annotations:
      external-dns.alpha.kubernetes.io/target: expectedbehaviors.com
    hosts:
      - host: mealie.expectedbehaviors.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - mealie.expectedbehaviors.com
        secretName: expectedbehaviors.com-tls
persistence:
  data:
    enabled: true
    existingClaim: mealie-data
    globalMounts:
      - path: /app/data
        readOnly: false
